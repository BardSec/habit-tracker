services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: habit_tracker
      POSTGRES_PASSWORD: habit_tracker
      POSTGRES_DB: habit_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habit_tracker"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
