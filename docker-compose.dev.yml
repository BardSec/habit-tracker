services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: flask run --host=0.0.0.0 --debug

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: habit_tracker
      POSTGRES_PASSWORD: habit_tracker
      POSTGRES_DB: habit_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habit_tracker"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_dev:
